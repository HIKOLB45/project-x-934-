<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canopy 3D Configurator</title>
    <base href="/project-x-9000/">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-container">
        <h2>Конструктор Навісу</h2>
        <div class="control">
            <label>Ширина: <span id="w-text">5</span>м</label>
            <input type="range" id="width-range" min="2" max="10" step="0.5" value="5">
        </div>
        <div class="control">
            <label>Довжина: <span id="l-text">4</span>м</label>
            <input type="range" id="length-range" min="2" max="12" step="0.5" value="4">
        </div>
        <div id="results">
            <p>Площа: <span id="area">20</span> м²</p>
            <p>Метал: <span id="metal">~145</span> кг</p>
        </div>
        <button onclick="resetCamera()">Скинути вигляд</button>
    </div>

    <div id="render-canvas"></div>

    <script src="script.js"></script>
</body>
</html>
